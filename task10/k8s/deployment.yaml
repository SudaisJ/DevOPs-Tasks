apiVersion: apps/v1
kind: Deployment
metadata:
  name: task10-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task10-app
  template:
    metadata:
      labels:
        app: task10-app
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'opsforge-app'
        vault.hashicorp.com/agent-inject-secret-database: 'secret/data/opsforge/database'
    spec:
      containers:
      - name: task10-app
        image: sudaisj/task10-app:IMAGE_TAG
        ports:
        - containerPort: 80
